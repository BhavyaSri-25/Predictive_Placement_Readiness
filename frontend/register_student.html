<!DOCTYPE html>
<html>
<head>
  <title>Predictive Placement Readiness — Register</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="animations.css">
  <style>
    html, body {
      background: linear-gradient(135deg, #E0F2FE 0%, #DCFCE7 100%) !important;
      min-height: 100vh;
    }
    body::before {
      display: none !important;
    }
    .auth-wrap {
      background: transparent !important;
    }
  </style>
</head>
<!--<body class="bg-animated" style="background: linear-gradient(135deg, #F7FAFF 0%, #ECFDF3 100%) !important;">-->

  <main class="auth-wrap fade-in">
    <div class="auth-brand" style="text-align:center;margin-bottom:14px">
      <div class="logo" style="display:inline-block">
        <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #667eea 0%, #10b981 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);">
          <img src="college_logo2.png" alt="College Logo" style="width: 36px; height: 36px; object-fit: contain;">
        </div>
      </div>
      <div style="margin-top:8px;font-weight:400;font-family:'DM Serif Text', serif;color:#071032;font-size:1.75rem;">Predictive Placement Readiness</div>
      <div class="muted" style="font-size:15px">Create your placement account</div>
    </div>

    <section class="card auth-card card-animated">
      <h2 style="display: flex; align-items: center; gap: 8px;" class="text-fade-in"><img src="student_logo2.png" alt="Student" style="width: 35px; height: 35px; object-fit: contain;"> Student Registration</h2>
      <p class="muted slide-in-left">Create your placement account — use your register number</p>

      <input id="registerNumber" type="text" placeholder="Register Number (e.g. 1MS19CS001)" required class="input-animated">
      <div style="position: relative; display: inline-block; width: 100%;">
        <input id="password" type="password" placeholder="Password" required class="input-animated" style="padding-right: 40px;">
        <span onclick="togglePassword()" style="position: absolute; right: 12px; top: 39px; cursor: pointer; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;">
          <img src="eye-closed.svg" alt="Show" style="width: 20px; height: 20px;">
        </span>
      </div>

      <button onclick="registerStudent()" class="btn primary btn-animated micro-bounce">Register</button>

      <p id="msg" class="success-msg"></p>

      <div class="auth-foot muted" style="margin-top:12px">Already registered? <a href="login_student.html">Login</a></div>
    </section>
    </main>

    <script>
  function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
  async function registerStudent() {
    const registerNumber = document.getElementById("registerNumber").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");
    msg.style.display = 'block';
    msg.style.color = 'inherit';

    if(registerNumber.length === 0) { msg.style.color = "red"; msg.innerText = "❌ Register number cannot be empty"; return; }
    if(password.length === 0) { msg.style.color = "red"; msg.innerText = "❌ Password cannot be empty"; return; }
    if (password.length < 5) { msg.style.color = "red"; msg.innerText = "❌ Password must be at least 5 characters"; return; }

    msg.innerText = "Registering...";
    try {
      const res = await fetch("/api/student/register", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ register_number: registerNumber, password }) });
      const data = await res.json();
      if (res.ok) {
        msg.style.color = "green";
        msg.innerText = "✅ Successfully registered! Redirecting to login...";
        setTimeout(() => { window.location.href = "login_student.html"; }, 1400);
        return;
      } else {
        msg.style.color = "red"; msg.innerText = data.error || '❌ Registration failed';
      }
    } catch (err) {
      msg.style.color = "red"; msg.innerText = '⚠️ Server error. Try again later.';
    }
  }

  function togglePassword() {
    const passwordField = document.getElementById('password');
    const eyeIcon = document.querySelector('span[onclick="togglePassword()"] img');
    
    if (passwordField.type === 'password') {
      passwordField.type = 'text';
      eyeIcon.src = 'eye-closed.svg';
      eyeIcon.alt = 'Hide';
    } else {
      passwordField.type = 'password';
      eyeIcon.src = 'eye-open.svg';
      eyeIcon.alt = 'Show';
    }
  }

  // Add Enter key functionality
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      registerStudent();
    }
  });
  </script>
  <script src="enhanced-animations.js"></script>
  </body>
  </html>
